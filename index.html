<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | المنصة التعليمية</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .progress-container { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; }
        #progress-bar { height: 100%; width: 0%; background: var(--primary); border-radius: 5px; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aurora 🧠</h1>
        <div id="app-area" class="card">
            <h3>اختر مادة للبدء</h3>
            <button class="btn" onclick="startQuiz('math')">الرياضيات</button>
            <button class="btn" onclick="startQuiz('physics')">الفيزياء</button>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
