<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aurora AI Library</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 15px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 مكتبة Aurora الشاملة</h1>
        <input type="text" id="search" placeholder="ابحث باسم المادة (إيطالي/عربي/إنجليزي)..." oninput="filter()">
        <div id="results"></div>
    </div>

    <script src="data.js"></script>
    <script>
        function filter() {
            const query = document.getElementById('search').value.toLowerCase();
            const res = document.getElementById('results');
            res.innerHTML = "";
            for (let sub in AuroraLibrary) {
                if (sub.toLowerCase().includes(query)) {
                    res.innerHTML += `<h3>${sub}</h3>`;
                    AuroraLibrary[sub].forEach(doc => {
                        res.innerHTML += `<div class="card"><strong>${doc.title}</strong><p>${doc.desc}</p><a href="${doc.link}" target="_blank">تحميل الملف</a></div>`;
                    });
                }
            }
        }
    </script>
</body>
</html>
