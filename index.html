<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aurora AI - المكتبة الرقمية</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Aurora AI</h1>
        <input type="text" id="search-input" placeholder="ابحث عن مادة (مثلاً: الرياضيات، Storia)..." oninput="searchLibrary()">
        <div id="results-area"></div>
    </div>
    <script src="data.js"></script>
    <script>
        function searchLibrary() {
            const query = document.getElementById("search-input").value.toLowerCase();
            const area = document.getElementById("results-area");
            area.innerHTML = "";
            
            for (let sub in AuroraLibrary) {
                if (sub.toLowerCase().includes(query)) {
                    area.innerHTML += `<h3>${sub}</h3>`;
                    AuroraLibrary[sub].forEach(doc => {
                        area.innerHTML += `
                            <div class="card">
                                <strong>${doc.title}</strong><br>
                                <p>${doc.desc}</p>
                                <a href="${doc.link}" target="_blank" class="btn" style="display:block; text-align:center; text-decoration:none;">تحميل/مشاهدة</a>
                            </div>`;
                    });
                }
            }
        }
    </script>
</body>
</html>
