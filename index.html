<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora AI - منصة التعليم الذكي</title>
    <style>
        :root { --primary: #007aff; --bg: #f5f5f7; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .search-section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        #results-area { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في Aurora 🧠</h1>
    
    <div class="search-section">
        <input type="text" id="search-input" placeholder="ابحث عن مادة، سؤال، أو ملف PDF...">
        <button class="btn" onclick="searchContent()">بحث</button>
    </div>

    <div id="quiz-container" class="card">
        <h3>اختر مادة للبدء</h3>
        <div id="subjects-list">
            <button class="btn" onclick="startQuiz('math')">الرياضيات</button>
            <button class="btn" onclick="startQuiz('physics')">الفيزياء</button>
            <button class="btn" onclick="startQuiz('literature')">الأدب الإيطالي</button>
        </div>
    </div>

    <div id="results-area"></div>
</div>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
